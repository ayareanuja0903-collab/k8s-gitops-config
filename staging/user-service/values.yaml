replicaCount: 2

image:
  repository: anuja/user-service
  tag: staging
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

containerPort: 3000

ingress:
  enabled: true
  className: nginx
  host: user-staging.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi

  requests:
    cpu: 250m
    memory: 256Mi

config:
  APP_ENV: staging

secret:
  DB_PASSWORD: staging-password

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  cpuUtilization: 70