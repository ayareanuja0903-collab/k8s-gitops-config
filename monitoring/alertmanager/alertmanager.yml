global:
  resolve_timeout: 5m

  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'ayareanuja0903@gmail.com'
  smtp_auth_username: 'ayareanuja0903@gmail.com'
  smtp_auth_password: '####'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: 'slack-email-receiver'

receivers:
  # 🔔 Slack Alerts
  - name: 'slack-email-receiver'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/XXXX/XXXX/XXXX'
        channel: '#alerts'
        send_resolved: true
        title: '🚨 Alert: {{ .CommonLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Instance:* {{ .CommonLabels.instance }}
          *Description:* {{ .CommonAnnotations.description }}

  # 📧 Email Alerts
    email_configs:
      - to: 'ayareanuja0903@gmail.com'
        send_resolved: true
        headers:
          subject: '🚨 Kubernetes Alert: {{ .CommonLabels.alertname }}'