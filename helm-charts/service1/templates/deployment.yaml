apiVersion: apps/v1
kind: Deployment
metadata:
  name: service1
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: service1
  template:
    metadata:
      labels:
        app: service1
    spec:
      containers:
        - name: service1
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
