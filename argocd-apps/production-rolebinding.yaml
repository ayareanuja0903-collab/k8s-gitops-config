apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: production-developer-binding
  namespace: production

subjects:
- kind: User
  name: developer-user
  apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: production-developer-role
  apiGroup: rbac.authorization.k8s.io