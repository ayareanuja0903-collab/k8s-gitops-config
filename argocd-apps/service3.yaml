apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ayareanuja0903-collab/k8s-gitops-config
    path: helm-charts/service3
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
